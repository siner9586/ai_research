name: open-evidence-fulltext-batch-1
on:
  pull_request:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  audit-fulltext:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install requests pypdf
      - name: Download and validate lawful OA PDFs
        run: python open_evidence_runner/fulltext_batch_audit.py --manifest open_evidence_runner/fulltext_batch_1.json --output fulltext-batch-1
      - name: Add page counts and metadata
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from pypdf import PdfReader
          root=Path('fulltext-batch-1')
          rows=json.loads((root/'fulltext_audit.json').read_text())
          for r in rows:
            if r.get('status')=='verified_pdf':
              try: r['pages']=len(PdfReader(str(root/r['file_name'])).pages)
              except Exception as e: r['pdf_parse_error']=repr(e); r['status']='failed_pdf_parse'
          (root/'fulltext_audit.json').write_text(json.dumps(rows,ensure_ascii=False,indent=2))
          (root/'summary.json').write_text(json.dumps({'total':len(rows),'verified':sum(x['status']=='verified_pdf' for x in rows),'failed':sum(x['status']!='verified_pdf' for x in rows),'completed':True},indent=2))
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: open-evidence-fulltext-batch-1
          path: fulltext-batch-1/
          retention-days: 30
          compression-level: 0
          if-no-files-found: error
