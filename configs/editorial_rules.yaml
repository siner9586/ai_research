principles:
  - Start from the problem the paper addresses, then explain the approach.
  - Prefer practitioner impact over academic hype.
  - Keep uncertainty visible when only title and abstract are available.
  - Link every claim back to the original paper and internal run records.
  - Do not copy third-party copy, brand identity, visual style, or article content.

brief_structure:
  - overview
  - featured_papers
  - also_worth_watching
  - internal_run_records
  - limitations

known_limits:
  zh:
    - 自动排序会偏向有社区信号、代码信号和工程关键词的论文。
    - 简报默认基于标题、摘要和公开元数据，不替代全文精读。
    - 外部 API 限流或不可用时，相关信号会降级为空并在内部记录中保留说明。
  en:
    - Automated ranking favors papers with community, code, and applied-engineering signals.
    - Briefs are based on titles, abstracts, and public metadata by default, not full-paper review.
    - External API failures degrade optional signals and are reflected in internal records.
