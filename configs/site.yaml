site:
  name:
    zh: AI 研究简报
    en: AI Research Brief
  tagline:
    zh: 从 arXiv 与公开信号中筛出值得跟进的 AI 论文
    en: Source-first daily briefs for AI papers worth tracking
  description:
    zh: 自动采集、排序并生成轻量中英双语 AI 论文简报。
    en: Automated AI paper collection, ranking, and compact bilingual research briefs.
  base_url: https://aici.ccwu.cc

pipeline:
  delay_days: 2
  fallback_days: 0
  arxiv_request_delay_seconds: 12.0
  arxiv_categories:
    - cs.AI
    - cs.CL
    - cs.LG
    - cs.CV
    - cs.MA
    - cs.IR
    - cs.RO
    - cs.SD
    - cs.MM
    - cs.HC
    - cs.SE
    - cs.DC
    - stat.ML
    - eess.AS
  max_results_per_category: 300
  max_total_results: 2400
  featured_min: 4
  featured_max: 6
  mentions_min: 12
  mentions_max: 20
  repeat_guard_days: 30
  repeat_guard_scope: featured_and_mentions
  repeat_guard_featured_strict: true

links:
  repository: https://github.com/siner9586/ai_research
  contact: mailto:editor@example.com
