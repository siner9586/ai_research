name: open-evidence-mendeley-public-api-diagnostic

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    strategy:
      fail-fast: false
      matrix:
        include:
          - dataset_id: 5w56cp2ftr
            version: 1
            expected: Dataset_master_TrustCalibration.csv
            output: diagnostic-transparency
          - dataset_id: 44c6hj9mzj
            version: 2
            expected: Raw data for analysis_v3_cleaned.xlsx
            output: diagnostic-job-shop
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install diagnostic runtime
        run: python -m pip install --disable-pip-version-check requests
      - name: Probe official public dataset routes and retain all outcomes
        run: >-
          python open_evidence_runner/diagnose_mendeley_public_api.py
          --dataset-id "${{ matrix.dataset_id }}"
          --version "${{ matrix.version }}"
          --expected "${{ matrix.expected }}"
          --output "${{ matrix.output }}"
      - name: Upload diagnostic package even when no file is resolved
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mendeley-public-api-${{ matrix.dataset_id }}-v${{ matrix.version }}
          path: ${{ matrix.output }}/
          retention-days: 30
          compression-level: 9
          if-no-files-found: error
