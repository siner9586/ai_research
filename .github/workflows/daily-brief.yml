name: daily-brief
on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: pip install -r requirements.txt -e .
      - run: ai-brief mock-run
      - run: pytest -q
      - run: cd apps/web && npm install && npm run build
