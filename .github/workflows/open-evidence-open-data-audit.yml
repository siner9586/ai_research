name: open-evidence-open-data-audit

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit-open-data:
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        target_id:
          - mendeley-transparency-paradox-v1
          - mendeley-job-shop-xai-v2
          - zenodo-adaptive-trust-responses-v1
          - zenodo-adaptive-trust-tasks-v1
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install audit runtime
        run: python -m pip install --disable-pip-version-check requests openpyxl
      - name: Download from official repository API and inspect file structure
        run: >-
          python open_evidence_runner/download_and_audit_open_data.py
          --targets open_evidence_runner/open_data_targets.json
          --target-id "${{ matrix.target_id }}"
          --output "output-${{ matrix.target_id }}"
      - name: Validate audit package
        shell: bash
        run: |
          python - <<'PY'
          import hashlib,json,pathlib
          root=pathlib.Path('output-${{ matrix.target_id }}')
          report=json.loads((root/'audit_report.json').read_text())
          assert report['completed'] is True
          files=list((root/'files').glob('*'))
          assert files, 'No downloaded target file'
          lines=(root/'sha256sums.txt').read_text().splitlines()
          for line in lines:
              expected,rel=line.split('  ',1)
              p=root/rel
              actual=hashlib.sha256(p.read_bytes()).hexdigest()
              assert actual==expected,(p,actual,expected)
          PY
      - name: Upload verified data and audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: open-data-audit-${{ matrix.target_id }}
          path: output-${{ matrix.target_id }}/
          retention-days: 30
          compression-level: 9
          if-no-files-found: error
