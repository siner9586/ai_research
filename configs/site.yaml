site:
  name:
    zh: AI 研究简报
    en: AI Research Brief
  tagline:
    zh: 从 arXiv 与公开信号中筛出值得跟进的 AI 论文
    en: Source-first daily briefs for AI papers worth tracking
  description:
    zh: 自动采集、评分、分层入选并生成中英双语简报，保留每期候选论文与评分理由。
    en: Automated AI paper collection, scoring, tiered selection, bilingual briefs, and transparent source logs.
  base_url: https://aici.ccwu.cc

pipeline:
  delay_days: 2
  fallback_days: 4
  arxiv_request_delay_seconds: 6.0
  arxiv_categories:
    - cs.AI
    - cs.CL
    - cs.LG
    - cs.CV
    - cs.MA
    - cs.IR
    - cs.RO
    - cs.SD
    - cs.MM
    - cs.HC
    - cs.SE
    - cs.DC
    - stat.ML
    - eess.AS
  max_results_per_category: 250
  max_total_results: 1200
  featured_min: 4
  featured_max: 6
  mentions_min: 12
  mentions_max: 20

links:
  repository: https://github.com/siner9586/ai_research
  contact: mailto:editor@example.com
