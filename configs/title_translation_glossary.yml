phrase_rules:
  - pattern: '^A\s+'
    replacement: '一种'
  - pattern: '^An\s+'
    replacement: '一种'
  - pattern: '^The\s+'
    replacement: ''
  - pattern: '\s*:\s*'
    replacement: '：'
  - pattern: '\s*,\s*'
    replacement: '，'
  - pattern: '\band\b'
    replacement: '与'
  - pattern: '\bfor\b'
    replacement: '面向'
  - pattern: '\bfrom\b'
    replacement: '来自'
  - pattern: '\btoward\b'
    replacement: '面向'
  - pattern: '\busing\b'
    replacement: '使用'
