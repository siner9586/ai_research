name: open-evidence-semantic-scholar-backfill

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: open-evidence-semantic-scholar-${{ github.ref }}
  cancel-in-progress: false

jobs:
  semantic-scholar-year:
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        year: [2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025, 2026]
    runs-on: ubuntu-latest
    timeout-minutes: 355
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install runtime
        run: python -m pip install --disable-pip-version-check requests urllib3
      - name: Exhaust official Semantic Scholar bulk-search tokens
        env:
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
        run: python open_evidence_runner/semantic_scholar_backfill.py --year "${{ matrix.year }}" --output "output-${{ matrix.year }}" --hours 5.5
      - name: Upload year audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semantic-scholar-${{ matrix.year }}
          path: output-${{ matrix.year }}/
          retention-days: 30
          compression-level: 6
          if-no-files-found: error

  aggregate:
    if: always()
    needs: semantic-scholar-year
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Download all year artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: semantic-scholar-*
          path: combined
          merge-multiple: true
      - name: Build combined master and audit archive
        run: python open_evidence_runner/combine_semantic_scholar.py --input combined --output aggregate
      - name: Upload complete Semantic Scholar audit package
        uses: actions/upload-artifact@v4
        with:
          name: semantic-scholar-backfill-all
          path: aggregate/
          retention-days: 30
          compression-level: 6
          if-no-files-found: error
