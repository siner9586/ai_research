name: open-evidence-crossref-backfill

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: open-evidence-crossref-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  crossref-year:
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        year: [2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025, 2026]
    runs-on: ubuntu-latest
    timeout-minutes: 355
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install runtime
        run: python -m pip install --disable-pip-version-check requests urllib3
      - name: Exhaust Crossref cursors for all query groups
        run: python open_evidence_runner/crossref_backfill.py --year "${{ matrix.year }}" --output "output-${{ matrix.year }}" --hours 5.5
      - name: Upload year audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crossref-${{ matrix.year }}
          path: output-${{ matrix.year }}/
          retention-days: 30
          compression-level: 6
          if-no-files-found: error

  aggregate:
    if: always()
    needs: crossref-year
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Download all year artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: crossref-*
          path: combined
          merge-multiple: true
      - name: Build combined master and audit archive
        run: python open_evidence_runner/combine_crossref.py --input combined --output aggregate
      - name: Upload complete Crossref audit package
        uses: actions/upload-artifact@v4
        with:
          name: crossref-backfill-all
          path: aggregate/
          retention-days: 30
          compression-level: 6
          if-no-files-found: error
