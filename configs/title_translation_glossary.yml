  - Agent
  - LLM
  - LRM
  - RAG
  - VLM
  - VLA
  - Video-MLLM
  - Video-MLLMs
  - SAM
  - OOD
  - Oracle
  - Shapley
  - Mamba
  - Transformer
  - Diffusion
  - LaTeX
  - API
  - GPU
  - CPU
  - CT
  - EEG
  - OCT
  - PDF
  - arXiv

