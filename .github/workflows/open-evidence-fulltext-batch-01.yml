name: open-evidence-fulltext-batch-01

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install runtime
        run: python -m pip install --disable-pip-version-check requests
      - name: Download and validate lawful open full texts
        run: python open_evidence_runner/fulltext_batch_audit.py fulltext-output
      - name: Validate audit summary
        run: |
          python - <<'PY'
          import json
          s=json.load(open('fulltext-output/summary.json'))
          assert s['targets']==10
          assert s['completed'] is True
          PY
      - name: Upload audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: open-evidence-fulltext-batch-01
          path: fulltext-output/
          retention-days: 30
          compression-level: 9
          if-no-files-found: error
