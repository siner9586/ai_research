name: open-evidence-crossref-cursor-diagnostic

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --disable-pip-version-check requests
      - name: Compare cursor behavior across sort modes
        run: python open_evidence_runner/crossref_cursor_diagnostic.py
