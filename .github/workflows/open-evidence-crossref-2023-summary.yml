name: open-evidence-crossref-2023-summary

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  extract-2023:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install HTTP runtime
        run: python -m pip install --disable-pip-version-check requests
      - name: Extract annual completion summary and manifest using ZIP byte ranges
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python open_evidence_runner/extract_remote_crossref_year.py \
            --repository siner9586/ai_research \
            --artifact-id 8605805885 \
            --year 2023 \
            --output summary-2023
      - name: Upload compact annual audit package
        uses: actions/upload-artifact@v4
        with:
          name: crossref-2023-summary-only
          path: summary-2023/
          retention-days: 30
          compression-level: 9
          if-no-files-found: error
