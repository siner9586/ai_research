name: Daily AI Brief Auto Publish

on:
  push:
    branches: [main]
  schedule:
    # 80 idempotent attempts every 10 minutes from 05:12 to 18:22 Asia/Taipei.
    # GitHub cron uses UTC. These compressed cron entries expand to 80 checks.
    # Once the current issue exists, later scheduled runs skip generation but still verify production.
    - cron: "12,22,32,42,52 21 * * *"       # 05:12-05:52 Asia/Taipei · attempts 01-05/80
    - cron: "2,12,22,32,42,52 22 * * *"    # 06:02-06:52 Asia/Taipei · attempts 06-11/80
    - cron: "2,12,22,32,42,52 23 * * *"    # 07:02-07:52 Asia/Taipei · attempts 12-17/80
    - cron: "2,12,22,32,42,52 0 * * *"     # 08:02-08:52 Asia/Taipei · attempts 18-23/80
    - cron: "2,12,22,32,42,52 1 * * *"     # 09:02-09:52 Asia/Taipei · attempts 24-29/80
    - cron: "2,12,22,32,42,52 2 * * *"     # 10:02-10:52 Asia/Taipei · attempts 30-35/80
    - cron: "2,12,22,32,42,52 3 * * *"     # 11:02-11:52 Asia/Taipei · attempts 36-41/80
    - cron: "2,12,22,32,42,52 4 * * *"     # 12:02-12:52 Asia/Taipei · attempts 42-47/80
    - cron: "2,12,22,32,42,52 5 * * *"     # 13:02-13:52 Asia/Taipei · attempts 48-53/80
    - cron: "2,12,22,32,42,52 6 * * *"     # 14:02-14:52 Asia/Taipei · attempts 54-59/80
    - cron: "2,12,22,32,42,52 7 * * *"     # 15:02-15:52 Asia/Taipei · attempts 60-65/80
    - cron: "2,12,22,32,42,52 8 * * *"     # 16:02-16:52 Asia/Taipei · attempts 66-71/80
    - cron: "2,12,22,32,42,52 9 * * *"     # 17:02-17:52 Asia/Taipei · attempts 72-77/80
    - cron: "2,12,22 10 * * *"             # 18:02-18:22 Asia/Taipei · attempts 78-80/80
  workflow_dispatch:
    inputs:
      delay_days:
        description: "Calendar T+N source target. Default keeps T+2."
        required: false
        default: "2"
      fallback_days:
        description: "Extra lookback days after T+2. Default tries 8 source dates."
        required: false
        default: "7"

permissions:
  contents: write

concurrency:
  group: daily-ai-research-brief-main
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fast-forward to latest main
        run: |
          git fetch origin main
          git checkout main
          git pull --ff-only origin main

      - name: Decide whether current issue already exists
        id: publish_state
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          from datetime import datetime
          from pathlib import Path
          from zoneinfo import ZoneInfo
          today = datetime.now(ZoneInfo('Asia/Taipei')).date().isoformat()
          zh_dir = Path('data/content/zh/daily')
          en_dir = Path('data/content/en/daily')
          zh_briefs = [p for p in zh_dir.glob(f'{today}-*.md') if not p.stem.endswith('-sources')]
          en_briefs = [p for p in en_dir.glob(f'{today}-*.md') if not p.stem.endswith('-sources')]
          skip = bool(zh_briefs and en_briefs)
          print(f'publish_date={today}')
          print(f'skip={str(skip).lower()}')
          print(f'zh_count={len(zh_briefs)}')
          print(f'en_count={len(en_briefs)}')
          PY

      - name: Skip generation when current issue exists
        if: steps.publish_state.outputs.skip == 'true'
        run: |
          echo "daily_brief_already_exists publish_date=${{ steps.publish_state.outputs.publish_date }} zh=${{ steps.publish_state.outputs.zh_count }} en=${{ steps.publish_state.outputs.en_count }}"
          echo "generation_skipped=true"
          echo "Production verification and deploy-hook self-healing will still run for this scheduled tick."

      - name: Verify existing issue is live and self-heal if stale
        if: steps.publish_state.outputs.skip == 'true'
        env:
          PUBLISH_DATE: ${{ steps.publish_state.outputs.publish_date }}
          CLOUDFLARE_PAGES_DEPLOY_HOOK_SECRET: ${{ secrets.CLOUDFLARE_PAGES_DEPLOY_HOOK }}
          CLOUDFLARE_PAGES_DEPLOY_HOOK_VAR: ${{ vars.CLOUDFLARE_PAGES_DEPLOY_HOOK }}
          VERIFY_ATTEMPTS: "20"
          VERIFY_INTERVAL_SECONDS: "30"
        run: |
          bash scripts/deploy_and_verify_production.sh

      - uses: actions/setup-python@v5
        if: steps.publish_state.outputs.skip != 'true'
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        if: steps.publish_state.outputs.skip != 'true'
        with:
          node-version: "22"

      - name: Install dependencies
        if: steps.publish_state.outputs.skip != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -e .

      - name: Preflight syntax check
        if: steps.publish_state.outputs.skip != 'true'
        run: |
          python -m compileall packages tests scripts

      - name: Generate real daily brief
        if: steps.publish_state.outputs.skip != 'true'
        env:
          DELAY_DAYS: ${{ github.event.inputs.delay_days || '2' }}
          FALLBACK_DAYS: ${{ github.event.inputs.fallback_days || '7' }}
          TITLE_TRANSLATION_USE_NETWORK: "1"
          TITLE_TRANSLATION_TIMEOUT: "4"
        run: |
          set -euo pipefail
          echo "production_mode=real"
          echo "delay_days=${DELAY_DAYS}"
          echo "fallback_days=${FALLBACK_DAYS}"
          ai-brief run-daily --delay-days "${DELAY_DAYS}" --fallback-days "${FALLBACK_DAYS}" | tee daily-brief-auto-result.json
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path('data/reports/runs/last-run.json').read_text(encoding='utf-8'))
          print('run_report_summary=' + json.dumps({
              'status': report.get('status'),
              'publish_date': report.get('publish_date'),
              'target_date': report.get('target_date'),
              'actual_date': report.get('actual_date'),
              'fallback_days': report.get('fallback_days'),
              'fallback_used': report.get('fallback_used'),
              'fallback_from': report.get('fallback_from'),
              'total_candidates': report.get('total_candidates'),
              'deduped_papers': report.get('deduped_papers'),
              'candidate_count': report.get('candidate_count'),
              'featured': report.get('featured'),
              'mentions': report.get('mentions'),
              'qa_passed': report.get('qa_passed'),
              'fetch_mode': report.get('fetch_mode'),
              'request_count': report.get('request_count'),
              'errors': report.get('errors'),
          }, ensure_ascii=False))
          if report.get('status') != 'success':
              raise SystemExit('run report is not successful')
          if report.get('mock'):
              raise SystemExit('daily production run must not use mock paper data')
          if int(report.get('total_candidates') or 0) <= 0:
              raise SystemExit('no candidates fetched')
          if int(report.get('deduped_papers') or 0) <= 0:
              raise SystemExit('no deduped papers fetched')
          if int(report.get('candidate_count') or 0) <= 0:
              raise SystemExit('no scored candidates produced')
          if int(report.get('request_count') or 0) <= 0:
              raise SystemExit('daily production run must make at least one arXiv request')
          if report.get('errors'):
              raise SystemExit('run report contains errors')
          PY

      - name: Run candidate lineage guard
        if: steps.publish_state.outputs.skip != 'true'
        run: |
          python scripts/candidate_lineage_guard.py --mode daily --max-fallback-days 7

      - name: Run publication scope guard
        if: steps.publish_state.outputs.skip != 'true'
        run: |
          python scripts/strict_t2_guard.py || {
            echo "::warning::publication scope guard failed; continuing because generation and candidate lineage already passed."
            echo "strict_t2_guard=warning"
          }

      - name: Run featured title localization guard
        if: steps.publish_state.outputs.skip != 'true'
        run: |
          python scripts/featured_titles_guard.py || {
            echo "::warning::featured title localization guard failed; continuing publish to avoid a missed daily issue."
            echo "featured_titles_guard=warning"
          }

      - name: Build Astro site
        if: steps.publish_state.outputs.skip != 'true'
        run: |
          cd apps/web
          npm install
          npm run build

      - name: Commit and push generated content
        id: commit
        if: steps.publish_state.outputs.skip != 'true'
        run: |
          set -euo pipefail
          git config user.name "ai-brief-bot"
          git config user.email "ai-brief-bot@example.com"
          git add data apps/web/public
          git status --short data apps/web/public || true
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            git diff --cached --stat
            python - <<'PY' > /tmp/brief-commit-message.txt
          import json
          from pathlib import Path
          report = json.loads(Path('data/reports/runs/last-run.json').read_text(encoding='utf-8'))
          print(f"chore: publish daily AI brief {report.get('publish_date')}")
          PY
            git commit -F /tmp/brief-commit-message.txt
            git pull --rebase origin main
            git push origin HEAD:main
            echo "commit_sha=$(git rev-parse HEAD)"
            echo "push_status=success"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "deploy_ref=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy and verify production pages
        if: steps.publish_state.outputs.skip != 'true' && steps.commit.outputs.has_changes == 'true'
        env:
          CLOUDFLARE_PAGES_DEPLOY_HOOK_SECRET: ${{ secrets.CLOUDFLARE_PAGES_DEPLOY_HOOK }}
          CLOUDFLARE_PAGES_DEPLOY_HOOK_VAR: ${{ vars.CLOUDFLARE_PAGES_DEPLOY_HOOK }}
          VERIFY_ATTEMPTS: "20"
          VERIFY_INTERVAL_SECONDS: "30"
        run: |
          set -euo pipefail
          PUBLISH_DATE="$(python - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path('data/reports/runs/last-run.json').read_text(encoding='utf-8'))
          print(report['publish_date'])
          PY
          )"
          export PUBLISH_DATE
          bash scripts/deploy_and_verify_production.sh
