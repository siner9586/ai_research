name: open-evidence-oidc-claims

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  claims:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Request short-lived OIDC token and expose non-sensitive claims
        shell: bash
        run: |
          set -euo pipefail
          RESPONSE=$(curl -fsS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=neon-open-evidence-import")
          TOKEN=$(python -c 'import json,sys; print(json.load(sys.stdin)["value"])' <<<"$RESPONSE")
          PAYLOAD=$(cut -d. -f2 <<<"$TOKEN")
          python - "$PAYLOAD" <<'PY'
          import base64, json, sys
          raw=sys.argv[1]
          raw += '=' * (-len(raw) % 4)
          claims=json.loads(base64.urlsafe_b64decode(raw))
          safe={k:claims.get(k) for k in ['iss','aud','sub','repository','repository_id','repository_owner','repository_owner_id','ref','head_ref','base_ref','event_name','workflow_ref','job_workflow_ref','repository_visibility','runner_environment']}
          open('oidc-claims.json','w').write(json.dumps(safe,indent=2))
          print(json.dumps(safe,indent=2))
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: open-evidence-oidc-claims
          path: oidc-claims.json
          retention-days: 7
