site:
  name:
    zh: 前沿论文雷达
    en: Frontier Paper Radar
  tagline:
    zh: 从源头论文中筛出值得跟进的 AI 研究信号
    en: A source-first radar for AI papers worth tracking
  description:
    zh: 自动采集、评分、分层入选并生成中英双语简报，保留每期候选论文与评分理由。
    en: Automated AI paper collection, scoring, tiered selection, bilingual briefs, and transparent source logs.
  base_url: http://localhost:4321

pipeline:
  delay_days: 3
  arxiv_categories:
    - cs.AI
    - cs.CL
    - cs.LG
    - cs.CV
    - cs.MA
    - cs.IR
  max_results_per_category: 80
  featured_min: 3
  featured_max: 5
  mentions_min: 8
  mentions_max: 12

links:
  repository: https://github.com/example/frontier-paper-radar
  contact: mailto:editor@example.com
