name: Force Cloudflare Pages Deploy

on:
  push:
    paths:
      - apps/web/public/build-version.txt
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Pages deploy hook
        env:
          CLOUDFLARE_PAGES_DEPLOY_HOOK_SECRET: ${{ secrets.CLOUDFLARE_PAGES_DEPLOY_HOOK }}
          CLOUDFLARE_PAGES_DEPLOY_HOOK_VAR: ${{ vars.CLOUDFLARE_PAGES_DEPLOY_HOOK }}
        run: |
          set -euo pipefail
          DEPLOY_HOOK="${CLOUDFLARE_PAGES_DEPLOY_HOOK_SECRET:-${CLOUDFLARE_PAGES_DEPLOY_HOOK_VAR:-}}"
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "::error::CLOUDFLARE_PAGES_DEPLOY_HOOK is missing in GitHub repository Secrets or Variables."
            exit 1
          fi
          curl -fsSL -X POST "$DEPLOY_HOOK"
          echo "deploy_hook_status=triggered"
