name: open-evidence-pubmed-backfill

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: open-evidence-pubmed-${{ github.ref }}
  cancel-in-progress: false

jobs:
  pubmed-year:
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        year: [2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025, 2026]
    runs-on: ubuntu-latest
    timeout-minutes: 355
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install runtime
        run: python -m pip install --disable-pip-version-check requests urllib3
      - name: Prepare normalized output directories
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          year = "${{ matrix.year }}"
          queries = json.loads(Path("open_evidence_runner/pubmed_queries.json").read_text(encoding="utf-8"))
          root = Path(f"output-{year}/normalized/pubmed/{year}")
          for query_group in queries:
              (root / query_group).mkdir(parents=True, exist_ok=True)
          PY
      - name: Retrieve PubMed records through official E-utilities
        env:
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          NCBI_EMAIL: ${{ secrets.NCBI_EMAIL }}
          NCBI_TOOL: ExplainabilityBiasOpenEvidence
        run: |
          python open_evidence_runner/pubmed_backfill_v2.py \
            --year "${{ matrix.year }}" \
            --output "output-${{ matrix.year }}" \
            --queries open_evidence_runner/pubmed_queries.json
      - name: Upload annual PubMed audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pubmed-${{ matrix.year }}
          path: output-${{ matrix.year }}/
          retention-days: 30
          compression-level: 6
          if-no-files-found: error

  aggregate:
    if: always()
    needs: pubmed-year
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Download annual PubMed artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: pubmed-*
          path: combined
          merge-multiple: true
      - name: Build combined PubMed master and audit summary
        run: python open_evidence_runner/combine_pubmed.py --input combined --output aggregate
      - name: Upload combined PubMed evidence package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pubmed-backfill-all
          path: aggregate/
          retention-days: 30
          compression-level: 6
          if-no-files-found: error
