name: Daily AI Research Brief

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "mock or real"
        required: false
        default: "real"

permissions:
  contents: write

jobs:
  daily:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -e .

      - name: Generate daily brief
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
          GITHUB_API_TOKEN: ${{ github.token }}
        run: |
          export LLM_PROVIDER="${LLM_PROVIDER:-mock}"
          if [ "${{ github.event.inputs.mode }}" = "mock" ]; then
            ai-brief mock-run
          else
            ai-brief run-daily --delay-days 3
          fi

      - name: Run tests
        run: pytest -q

      - name: Build Astro site
        run: |
          cd apps/web
          npm install
          npm run build

      - name: Commit generated content
        run: |
          git config user.name "ai-brief-bot"
          git config user.email "ai-brief-bot@example.com"
          git add data apps/web/public
          git commit -m "Update daily AI research brief" || echo "No generated changes"
          git push

      - name: Send notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          SITE_URL: https://aici.ccwu.cc
        run: |
          python scripts/notify_telegram.py || true
          python scripts/send_email.py || true
