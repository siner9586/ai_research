name: open-evidence-fulltext-audit-1

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install PDF audit runtime
        run: python -m pip install --disable-pip-version-check requests pypdf
      - name: Download and verify lawful open fulltexts
        run: python open_evidence_runner/fulltext_batch_audit.py --output fulltext-audit-1
      - name: Validate audit summary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          p=Path('fulltext-audit-1/completion_summary.json')
          s=json.loads(p.read_text())
          assert s['targets']==4
          assert s['verified']>=1
          PY
      - name: Upload verified PDFs and audit manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: open-evidence-fulltext-audit-1
          path: fulltext-audit-1/
          retention-days: 30
          compression-level: 6
          if-no-files-found: error
