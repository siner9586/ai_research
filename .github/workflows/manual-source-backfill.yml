name: Manual Source Date Backfill

on:
  workflow_dispatch:
    inputs:
      publish_date:
        description: "Publication date, e.g. 2026-06-08"
        required: true
      source_date:
        description: "Real non-empty arXiv source date, e.g. 2026-06-05"
        required: true

permissions:
  contents: write

concurrency:
  group: manual-source-date-backfill-${{ github.ref }}
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -e .

      - name: Preflight syntax check
        run: |
          python -m compileall packages tests scripts

      - name: Clean generated artifacts
        run: |
          set -euo pipefail
          git checkout -- data/content data/reports apps/web/public || true
          # Manual source-date backfill must not delete or mutate the committed source candidates.
          rm -f data/content/zh/daily/${{ github.event.inputs.publish_date }}-*.md
          rm -f data/content/en/daily/${{ github.event.inputs.publish_date }}-*.md
          rm -f data/reports/qa/${{ github.event.inputs.publish_date }}.json
          rm -f data/reports/runs/${{ github.event.inputs.publish_date }}.json
          rm -f data/reports/runs/last-run.json
          rm -f manual-source-backfill-result.json

      - name: Validate source override
        run: |
          python - <<'PY'
          from datetime import date, timedelta
          publish = date.fromisoformat('${{ github.event.inputs.publish_date }}')
          source = date.fromisoformat('${{ github.event.inputs.source_date }}')
          calendar_t2 = publish - timedelta(days=2)
          if source > calendar_t2:
              raise SystemExit(f"source_date cannot be after calendar T+2: source={source} calendar_t2={calendar_t2}")
          print(f"validated_source_override publish_date={publish} calendar_t2_date={calendar_t2} source_date={source} fallback_days=0 fallback_used=false")
          PY

      - name: Inspect committed source candidates
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          source = '${{ github.event.inputs.source_date }}'
          required = {
              'papers': Path(f'data/processed/{source}/papers.json'),
              'scored': Path(f'data/processed/{source}/scored_papers.json'),
              'selected': Path(f'data/processed/{source}/selected_papers.json'),
          }
          missing = [f'{name}:{path}' for name, path in required.items() if not path.exists()]
          env_value = '0'
          if missing:
              print('source_candidates_state=incomplete fallback_refetch_allowed=true missing=' + ','.join(missing))
          else:
              scored = json.loads(required['scored'].read_text(encoding='utf-8'))
              selected = json.loads(required['selected'].read_text(encoding='utf-8'))
              featured_count = len(selected.get('featured', []))
              mentions_count = len(selected.get('mentions', []))
              print(
                  'source_candidates_state=complete reuse_existing_source=true '
                  f'candidate_count={len(scored)} featured_count={featured_count} mentions_count={mentions_count}'
              )
              env_value = '1'
          with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as handle:
              handle.write(f'AI_RESEARCH_SOURCE_CANDIDATES_PRESENT={env_value}\n')
          PY

      - name: Generate brief from source date
        env:
          AI_RESEARCH_PUBLISH_DATE: ${{ github.event.inputs.publish_date }}
          AI_RESEARCH_REUSE_EXISTING_SOURCE: "1"
          LLM_PROVIDER: mock
        run: |
          ai-brief run-daily --date "${{ github.event.inputs.source_date }}" --fallback-days 0 | tee manual-source-backfill-result.json
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          publish = '${{ github.event.inputs.publish_date }}'
          source = '${{ github.event.inputs.source_date }}'
          report = json.loads(Path('data/reports/runs/last-run.json').read_text())
          print('run_report_summary=' + json.dumps({
              'status': report.get('status'),
              'publish_date': report.get('publish_date'),
              'target_date': report.get('target_date'),
              'actual_date': report.get('actual_date'),
              'fallback_days': report.get('fallback_days'),
              'fallback_used': report.get('fallback_used'),
              'total_candidates': report.get('total_candidates'),
              'deduped_papers': report.get('deduped_papers'),
              'candidate_count': report.get('candidate_count'),
              'featured': report.get('featured'),
              'mentions': report.get('mentions'),
              'slugs': report.get('slugs'),
              'qa_passed': report.get('qa_passed'),
              'fetch_mode': report.get('fetch_mode'),
              'reuse_existing_source': report.get('reuse_existing_source'),
              'candidate_file': report.get('candidate_file'),
              'selected_file': report.get('selected_file'),
              'errors': report.get('errors'),
          }, ensure_ascii=False))
          if report.get('publish_date') != publish:
              raise SystemExit('publish_date mismatch')
          if report.get('target_date') != source:
              raise SystemExit('target_date/source_date mismatch')
          if report.get('actual_date') != source:
              raise SystemExit('actual_date/source_date mismatch')
          if report.get('fallback_days') != 0 or report.get('fallback_used'):
              raise SystemExit('fallback must remain disabled')
          if report.get('mock'):
              raise SystemExit('manual production backfill must not be mock')
          if int(report.get('total_candidates') or 0) <= 0:
              raise SystemExit('source date returned no candidates')
          expected_candidate = f'data/processed/{source}/scored_papers.json'
          expected_selected = f'data/processed/{source}/selected_papers.json'
          if report.get('candidate_file') != expected_candidate:
              raise SystemExit(f'candidate_file mismatch: {report.get("candidate_file")} != {expected_candidate}')
          if report.get('selected_file') != expected_selected:
              raise SystemExit(f'selected_file mismatch: {report.get("selected_file")} != {expected_selected}')
          if os.environ.get('AI_RESEARCH_SOURCE_CANDIDATES_PRESENT') == '1' and not report.get('reuse_existing_source'):
              raise SystemExit('committed source candidates existed but were not reused')
          if report.get('errors'):
              raise SystemExit('run report contains errors')
          PY

      - name: Build Astro site
        run: |
          cd apps/web
          npm install
          npm run build

      - name: Commit and push generated content
        run: |
          set -euo pipefail
          git config user.name "ai-brief-bot"
          git config user.email "ai-brief-bot@example.com"
          git add data apps/web/public
          git status --short data apps/web/public || true
          if git diff --cached --quiet; then
            echo "No generated changes to commit. Deploying current main anyway."
          else
            git diff --cached --stat
            git commit -m "chore: backfill ${{ github.event.inputs.publish_date }} brief from source ${{ github.event.inputs.source_date }}"
            git push origin HEAD:main
          fi
          echo "DEPLOY_REF=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Trigger Cloudflare Pages deploy
        env:
          CLOUDFLARE_PAGES_DEPLOY_HOOK_SECRET: ${{ secrets.CLOUDFLARE_PAGES_DEPLOY_HOOK }}
          CLOUDFLARE_PAGES_DEPLOY_HOOK_VAR: ${{ vars.CLOUDFLARE_PAGES_DEPLOY_HOOK }}
        run: |
          set -euo pipefail
          DEPLOY_HOOK="${CLOUDFLARE_PAGES_DEPLOY_HOOK_SECRET:-${CLOUDFLARE_PAGES_DEPLOY_HOOK_VAR:-}}"
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "::error::CLOUDFLARE_PAGES_DEPLOY_HOOK is required as a repository secret or variable so a successful content backfill cannot leave production stale."
            exit 1
          fi
          curl -fsSL -X POST "$DEPLOY_HOOK"
          echo "deploy_hook_status=triggered ref=${DEPLOY_REF:-unknown}"
