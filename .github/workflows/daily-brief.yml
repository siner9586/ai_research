name: Daily AI Research Brief

on:
  schedule:
    - cron: "12 23 * * *"
  push:
    branches:
      - main
    paths:
      - .github/daily-brief.force
      - .github/daily-brief-formal-retry.force
  workflow_dispatch:
    inputs:
      mode:
        description: "real or mock"
        required: false
        default: "real"
        type: choice
        options:
          - real
          - mock
      date:
        description: "Optional YYYY-MM-DD data date"
        required: false
      publish_date:
        description: "Optional YYYY-MM-DD publication date"
        required: false
      backfill:
        description: "Optional comma list publish_date:data_date, e.g. 2026-06-08:2026-06-06"
        required: false
      delay_days:
        description: "Delay days when date is not provided"
        required: false
        default: "2"
      fallback_days:
        description: "How many days to search backward if target date has no papers"
        required: false
        default: "0"
  repository_dispatch:
    types: [daily-brief]

permissions:
  contents: write
  actions: read

concurrency:
  group: daily-ai-research-brief-${{ github.ref }}
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Resolve trigger inputs
        env:
          MODE_INPUT: ${{ github.event.inputs.mode || github.event.client_payload.mode || '' }}
          DATE_INPUT: ${{ github.event.inputs.date || github.event.client_payload.date || '' }}
          PUBLISH_DATE_INPUT: ${{ github.event.inputs.publish_date || github.event.client_payload.publish_date || '' }}
          BACKFILL_INPUT: ${{ github.event.inputs.backfill || github.event.client_payload.backfill || '' }}
          DELAY_DAYS_INPUT: ${{ github.event.inputs.delay_days || github.event.client_payload.delay_days || '' }}
          FALLBACK_DAYS_INPUT: ${{ github.event.inputs.fallback_days || github.event.client_payload.fallback_days || '' }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          def clean(value: str | None) -> str:
              if value is None:
                  return ""
              value = str(value).strip()
              if len(value) >= 2 and value[0] == value[-1] and value[0] in {'"', "'"}:
                  value = value[1:-1]
              return value.strip()

          force = {}
          force_path = Path(".github/daily-brief.force")
          if force_path.exists():
              for raw in force_path.read_text(encoding="utf-8").splitlines():
                  line = raw.strip()
                  if not line or line.startswith("#") or ":" not in line:
                      continue
                  key, value = line.split(":", 1)
                  force[key.strip()] = clean(value)

          def pick(env_name: str, force_key: str, default: str = "") -> str:
              return clean(os.environ.get(env_name)) or force.get(force_key, "") or default

          values = {
              "EFFECTIVE_MODE": pick("MODE_INPUT", "mode", "real"),
              "EFFECTIVE_DATE": pick("DATE_INPUT", "date", ""),
              "EFFECTIVE_PUBLISH_DATE": pick("PUBLISH_DATE_INPUT", "publish_date", ""),
              "EFFECTIVE_BACKFILL": pick("BACKFILL_INPUT", "backfill", ""),
              "EFFECTIVE_DELAY_DAYS": pick("DELAY_DAYS_INPUT", "delay_days", "2"),
              "EFFECTIVE_FALLBACK_DAYS": pick("FALLBACK_DAYS_INPUT", "fallback_days", "0"),
              "EFFECTIVE_CLEANUP_MOCK_ARTIFACTS": force.get("cleanup_mock_artifacts", "false").lower(),
          }
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as fh:
              for key, value in values.items():
                  fh.write(f"{key}={value}\n")
          print("resolved_inputs=" + str(values))
          PY

      - name: Print trigger summary
        run: |
          echo "trigger=${GITHUB_EVENT_NAME}"
          echo "workflow=${GITHUB_WORKFLOW}"
          echo "ref=${GITHUB_REF}"
          echo "sha=${GITHUB_SHA}"
          echo "mode=${EFFECTIVE_MODE}"
          echo "date=${EFFECTIVE_DATE:-<not set>}"
          echo "publish_date=${EFFECTIVE_PUBLISH_DATE:-<not set>}"
          echo "backfill=${EFFECTIVE_BACKFILL:-<not set>}"
          echo "delay_days=${EFFECTIVE_DELAY_DAYS}"
          echo "fallback_days=${EFFECTIVE_FALLBACK_DAYS}"
          echo "cleanup_mock_artifacts=${EFFECTIVE_CLEANUP_MOCK_ARTIFACTS}"
          echo "utc_now=$(date -u '+%Y-%m-%d %H:%M:%S %Z')"
          TZ=Asia/Shanghai date '+beijing_taipei_now=%Y-%m-%d %H:%M:%S %Z'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -e .

      - name: Run tests before production generation
        env:
          AI_RESEARCH_PUBLISH_DATE: "2026-06-03"
        run: pytest -q

      - name: Clean test-generated artifacts
        run: |
          git checkout -- data apps/web/public || true
          git clean -fd data/raw/2026-06-03 data/processed/2026-06-03 data/reports data/content/zh/daily/2026-06-03-* data/content/en/daily/2026-06-03-* || true

      - name: Clean known wrong generated artifacts
        run: |
          if [ "${EFFECTIVE_CLEANUP_MOCK_ARTIFACTS:-false}" = "true" ]; then
            rm -rf data/raw/2026-06-04 data/processed/2026-06-04
            rm -f data/content/zh/daily/2026-06-08-ai-research-brief*.md
            rm -f data/content/en/daily/2026-06-08-ai-research-brief*.md
            rm -f data/content/zh/daily/2026-06-09-*.md
            rm -f data/content/en/daily/2026-06-09-*.md
            rm -f data/reports/qa/2026-06-08.json data/reports/runs/2026-06-08.json
            rm -f data/reports/qa/2026-06-09.json data/reports/runs/2026-06-09.json
          fi

      - name: Generate daily brief
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
          AI_RESEARCH_EXTERNAL_SIGNALS: ${{ secrets.AI_RESEARCH_EXTERNAL_SIGNALS }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_API_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          export LLM_PROVIDER="${LLM_PROVIDER:-mock}"
          MODE="${EFFECTIVE_MODE:-real}"
          DATE="${EFFECTIVE_DATE:-}"
          PUBLISH_DATE="${EFFECTIVE_PUBLISH_DATE:-}"
          BACKFILL="${EFFECTIVE_BACKFILL:-}"
          DELAY_DAYS="${EFFECTIVE_DELAY_DAYS:-2}"
          FALLBACK_DAYS="${EFFECTIVE_FALLBACK_DAYS:-0}"

          echo "provider=${LLM_PROVIDER}"
          echo "production_mode=${MODE}"
          if [ "$MODE" != "real" ] && [ "$MODE" != "mock" ]; then
            echo "Unsupported mode: $MODE"
            exit 1
          fi
          if [ "$FALLBACK_DAYS" != "0" ]; then
            echo "fallback_days must be 0 for strict production generation; got $FALLBACK_DAYS"
            exit 1
          fi

          validate_pair() {
            local publish_date="$1"
            local data_date="$2"
            python - "$publish_date" "$data_date" <<'PY'
          import sys
          from datetime import date, timedelta
          publish_date = date.fromisoformat(sys.argv[1])
          data_date = date.fromisoformat(sys.argv[2])
          expected = publish_date - timedelta(days=2)
          if data_date != expected:
              raise SystemExit(f"Backfill must be explicit T+2: publish_date={publish_date} data_date={data_date} expected_data_date={expected}")
          print(f"validated_t2_pair publish_date={publish_date} target_date={data_date} actual_date={data_date} fallback_days=0 fallback_used=false")
          PY
          }

          run_one() {
            local data_date="$1"
            local publish_date="$2"
            if [ -n "$publish_date" ]; then
              validate_pair "$publish_date" "$data_date"
              export AI_RESEARCH_PUBLISH_DATE="$publish_date"
              echo "AI_RESEARCH_PUBLISH_DATE=$AI_RESEARCH_PUBLISH_DATE"
            else
              unset AI_RESEARCH_PUBLISH_DATE || true
            fi
            echo "target_date=$data_date"
            echo "actual_date=$data_date"
            echo "fallback_days=$FALLBACK_DAYS"
            echo "fallback_used=false"
            if [ "$MODE" = "mock" ]; then
              ai-brief mock-run --date "$data_date" --fallback-days "$FALLBACK_DAYS" | tee "daily-brief-result-${publish_date:-single}.json"
            else
              ai-brief run-daily --date "$data_date" --fallback-days "$FALLBACK_DAYS" | tee "daily-brief-result-${publish_date:-single}.json"
            fi
          }

          if [ -n "$BACKFILL" ]; then
            if [ "$MODE" = "mock" ]; then
              echo "Backfill must run in real mode, not mock mode."
              exit 1
            fi
            IFS=',' read -ra ENTRIES <<< "$BACKFILL"
            for entry in "${ENTRIES[@]}"; do
              item="$(echo "$entry" | xargs)"
              publish_date="${item%%:*}"
              data_date="${item#*:}"
              if [ -z "$publish_date" ] || [ -z "$data_date" ] || [ "$publish_date" = "$data_date" ] && [[ "$item" != *:* ]]; then
                echo "Invalid backfill entry: $entry"
                exit 1
              fi
              echo "Backfilling publish_date=$publish_date data_date=$data_date"
              run_one "$data_date" "$publish_date"
            done
          elif [ -n "$DATE" ]; then
            run_one "$DATE" "$PUBLISH_DATE"
          else
            if [ -n "$PUBLISH_DATE" ]; then
              export AI_RESEARCH_PUBLISH_DATE="$PUBLISH_DATE"
            fi
            if [ "$MODE" = "mock" ]; then
              ai-brief mock-run --fallback-days "$FALLBACK_DAYS" | tee daily-brief-result.json
            else
              ai-brief run-daily --delay-days "$DELAY_DAYS" --fallback-days "$FALLBACK_DAYS" | tee daily-brief-result.json
            fi
          fi

          python - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path("data/reports/runs/last-run.json").read_text())
          print("run_report_summary=" + json.dumps({
              "status": report.get("status"),
              "trigger": report.get("trigger"),
              "publish_date": report.get("publish_date"),
              "target_date": report.get("target_date"),
              "actual_date": report.get("actual_date"),
              "fallback_days": report.get("fallback_days"),
              "fallback_used": report.get("fallback_used"),
              "categories": report.get("categories"),
              "category_counts": report.get("category_counts"),
              "errors": report.get("errors"),
              "warnings": report.get("warnings"),
              "total_candidates": report.get("total_candidates"),
              "deduped_papers": report.get("deduped_papers"),
              "featured": report.get("featured"),
              "mentions": report.get("mentions"),
              "slugs": report.get("slugs"),
              "generated_files": report.get("generated_files"),
              "qa_passed": report.get("qa_passed"),
              "qa_warnings": report.get("qa_warnings"),
          }, ensure_ascii=False))
          PY

      - name: Run strict T+2 artifact guard
        if: ${{ env.EFFECTIVE_MODE != 'mock' }}
        run: python scripts/strict_t2_guard.py

      - name: Build Astro site
        run: |
          cd apps/web
          npm install
          npm run build

      - name: Commit generated content
        id: commit
        run: |
          set -euo pipefail
          if [ "${EFFECTIVE_MODE:-real}" = "mock" ]; then
            echo "Mock mode is validation-only; generated demo content will not be committed or published."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "ai-brief-bot"
          git config user.email "ai-brief-bot@example.com"
          git add data apps/web/public

          echo "Generated file status:"
          git status --short data apps/web/public || true

          python - <<'PY'
          import json
          from pathlib import Path
          report_path = Path("data/reports/runs/last-run.json")
          if report_path.exists():
              report = json.loads(report_path.read_text())
              print("publish_date=" + str(report.get("publish_date")))
              print("target_date=" + str(report.get("target_date")))
              print("actual_date=" + str(report.get("actual_date")))
              print("fallback_days=" + str(report.get("fallback_days")))
              print("fallback_used=" + str(report.get("fallback_used")))
              print("candidate_count=" + str(report.get("total_candidates")))
              print("deduped_papers=" + str(report.get("deduped_papers")))
              print("featured_count=" + str(report.get("featured")))
              print("mentions_count=" + str(report.get("mentions")))
              print("generated_files=" + json.dumps(report.get("generated_files", []), ensure_ascii=False))
              print("latest_brief_slug_zh=" + str(report.get("slugs", {}).get("zh")))
              print("latest_brief_slug_en=" + str(report.get("slugs", {}).get("en")))
          else:
              print("No last-run report found")
          PY

          if git diff --cached --quiet; then
            echo "git_diff=false"
            echo "No generated changes to commit. The run succeeded but produced identical committed artifacts."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "git_diff=true"
            git diff --cached --stat
            python - <<'PY' > /tmp/brief-commit-message.txt
          import json
          from pathlib import Path
          report = json.loads(Path("data/reports/runs/last-run.json").read_text())
          print(f"Fix strict T+2 brief generation and rebuild {report.get('publish_date')} issue")
          PY
            git commit -F /tmp/brief-commit-message.txt
            git pull --rebase origin main
            git push origin HEAD:main
            echo "commit_sha=$(git rev-parse HEAD)"
            echo "push_status=success"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Cloudflare Pages deploy hook
        if: steps.commit.outputs.has_changes == 'true'
        env:
          CLOUDFLARE_PAGES_DEPLOY_HOOK: ${{ secrets.CLOUDFLARE_PAGES_DEPLOY_HOOK }}
        run: |
          if [ -n "$CLOUDFLARE_PAGES_DEPLOY_HOOK" ]; then
            if curl -fsS -X POST "$CLOUDFLARE_PAGES_DEPLOY_HOOK"; then
              echo "cloudflare_deploy_hook=success"
            else
              echo "::warning::Cloudflare Pages deploy hook failed"
            fi
          else
            echo "CLOUDFLARE_PAGES_DEPLOY_HOOK not set, skipped"
          fi

      - name: Send notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          SITE_URL: https://aici.ccwu.cc
        run: |
          python scripts/notify_telegram.py || true
          python scripts/send_email.py || true
