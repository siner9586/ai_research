name: Daily AI Research Brief Formal Retry

on:
  push:
    branches:
      - main
    paths:
      - .github/daily-brief-formal-retry.force
  workflow_dispatch:
    inputs:
      date:
        description: "Optional YYYY-MM-DD data date"
        required: false
      delay_days:
        description: "Delay days when date is not provided"
        required: false
        default: "2"
      fallback_days:
        description: "Fallback window"
        required: false
        default: "7"

permissions:
  contents: write
  actions: read

concurrency:
  group: daily-ai-research-brief-main
  cancel-in-progress: false

jobs:
  retry:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -e .

      - name: Run formal generation
        env:
          LLM_PROVIDER: mock
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_API_TOKEN: ${{ github.token }}
          DATE_INPUT: ${{ github.event.inputs.date || '' }}
          DELAY_DAYS_INPUT: ${{ github.event.inputs.delay_days || '2' }}
          FALLBACK_DAYS_INPUT: ${{ github.event.inputs.fallback_days || '7' }}
        run: |
          set -euo pipefail
          DATE="${DATE_INPUT:-}"
          DELAY_DAYS="${DELAY_DAYS_INPUT:-2}"
          FALLBACK_DAYS="${FALLBACK_DAYS_INPUT:-7}"
          if [ -n "$DATE" ]; then
            ai-brief run-daily --date "$DATE" --fallback-days "$FALLBACK_DAYS"
          else
            ai-brief run-daily --delay-days "$DELAY_DAYS" --fallback-days "$FALLBACK_DAYS"
          fi

      - name: Test and build
        run: |
          pytest -q
          cd apps/web
          npm ci || npm install
          npm run build

      - name: Commit and push
        id: commit
        run: |
          set -euo pipefail
          git config user.name "ai-brief-bot"
          git config user.email "ai-brief-bot@example.com"
          git add data apps/web/public
          git status --short data apps/web/public || true
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "Update daily AI research brief"
          git pull --rebase origin main || true
          git push origin HEAD:main
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Cloudflare deploy
        if: steps.commit.outputs.has_changes == 'true'
        env:
          DEPLOY_HOOK: ${{ secrets.CLOUDFLARE_PAGES_DEPLOY_HOOK }}
        run: |
          if [ -n "${DEPLOY_HOOK:-}" ]; then
            curl -fsS -X POST "$DEPLOY_HOOK" || true
          fi
