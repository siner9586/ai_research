name: open-evidence-osf-statistical-schema

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  audit-algorithm-appreciation-schema:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install statistical file readers
        run: python -m pip install --disable-pip-version-check pandas pyreadstat
      - name: Download verified OSF file artifact
        uses: actions/download-artifact@v4
        with:
          name: osf-file-audit-osf-algorithm-appreciation
          path: verified-osf-files
          github-token: ${{ github.token }}
          repository: siner9586/ai_research
          run-id: 30111179403
      - name: Read SPSS and Stata schemas without exporting participant values
        run: >-
          python open_evidence_runner/audit_statistical_data_schema.py
          --artifact-root verified-osf-files
          --output schema-audit
      - name: Validate audit completeness
        run: |
          python - <<'PY'
          import json
          report=json.load(open('schema-audit/statistical_schema_audit.json'))
          summary=report['summary']
          assert summary['completed'] is True
          assert summary['statistical_files_found'] >= 1
          assert summary['statistical_files_readable'] == summary['statistical_files_found']
          assert all(item.get('privacy_boundary') for item in report['files'])
          PY
      - name: Upload schema-only audit
        uses: actions/upload-artifact@v4
        with:
          name: osf-algorithm-appreciation-statistical-schema
          path: schema-audit/
          retention-days: 30
          compression-level: 9
          if-no-files-found: error
